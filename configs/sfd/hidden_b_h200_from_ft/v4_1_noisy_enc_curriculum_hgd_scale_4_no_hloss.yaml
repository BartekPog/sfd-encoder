# V4.1 Exp: 3-pass + noisy_img_encode + hidden curriculum + HGD scale 4 + NO hidden loss
# Pass 3 (hidden denoising) is effectively disabled by setting both hidden_weight and
# hidden_cos_weight to 0.0 — the forward pass may still run but contributes zero loss.
# This is the correct way to disable the hidden loss (vs. the broken warmup=999999 trick).
# V4.1: uses consistent noise for hidden tokens across Pass 1 and Pass 3.
# Hidden t_h bias: shifted logit-normal mu decays from 2.0 -> 0.5 over 30K steps
# Encoder trained purely through the image-conditioned loss in Pass 2.
# Initialized from v2_finetune_no_hidden 1540K checkpoint
# Target: 4x H200, batch/gpu=64, NO gradient accumulation
# Effective batch size: 64 * 4 = 256

ckpt_path: ''

data:
  data_path: '/dais/fs/scratch/bpogodzi/hidden-diffusion/datasets/imagenet-sfd-latents/train/sdvae_f16d32_semvaebasech16_repadinov2_vitb14_reg/imagenet_train_256'
  fid_reference_file: 'outputs/ADM_npz/VIRTUAL_imagenet256_labeled.npz'
  image_size: 256
  num_classes: 1000
  num_workers: 8
  latent_norm: true
  latent_sv_norm: true
  latent_multiplier: 1.0

vae:
  model_name: 'sdvae_f16d32'
  downsample_ratio: 16

model:
  model_type: HiddenLightningDiT_B_1_H8
  use_qknorm: true
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  wo_shift: false
  in_chans: 48
  semantic_chans: 16
  semfirst_delta_t: 0.3
  semantic_weight: 2.0
  use_repa: true
  repa_dino_version: "dinov2_vitb14_reg"
  repa_feat_depth: 2
  repa_weight: 0.5
  repa_mode: 'cos_mse'
  share_timestep_embedder: true
  # Hidden token settings — hidden loss disabled via zero weights
  use_hidden_tokens: true
  hidden_weight: 0.0
  hidden_cos_weight: 0.0
  normalize_hidden: true
  hidden_reg_weight: 0.01
  noisy_img_encode: true
  hidden_reuse_noise_pass2: true
  hidden_reuse_noise_pass3: true
  # Dynamic gradient scaling for encoder
  hidden_grad_dyn_scale: 4.0
  # Curriculum: t_h bias (shifted logit-normal)
  hidden_t_shift_init: 2.0
  hidden_t_shift_final: 0.5
  hidden_t_shift_warmup: 30000
  # Curriculum: hidden loss warmup (Pass 3 probability ramp)
  hidden_loss_warmup_start: 20000
  hidden_loss_warmup_end: 50000

train:
  max_steps: 100000
  global_batch_size: 256
  grad_accum_steps: 1
  global_seed: 0
  output_dir: 'outputs/train'
  exp_name: 'v4_1_noisy_enc_curriculum_hgd_scale_4_no_hloss'
  ckpt: null
  log_every: 10
  ckpt_every: 40000
  ckpt_last_every: 1000
  ckpt_keep_every: 20000
  resume: true
  weight_init: 'outputs/train/v2_finetune_no_hidden/checkpoints/1540000.pt'

optimizer:
  lr: 0.0001
  beta2: 0.999
  max_grad_norm: 1.0

transport:
  path_type: Linear
  prediction: velocity
  loss_weight: null
  sample_eps: null
  train_eps: null
  use_cosine_loss: true
  use_lognorm: true

sample:
  mode: ODE
  sampling_method: dopri5
  atol: 0.000001
  rtol: 0.001
  reverse: false
  likelihood: false
  num_sampling_steps: 250
  cfg_scale: 1.0
  per_proc_batch_size: 4
  fid_num: 50000
  cfg_interval_start: 0
  timestep_shift: 0

wandb:
  tags: ["v4_1", "base", "H8", "no_hloss", "shared_temb", "h200", "from_ft_1540k", "noisy_img_encode", "hidden_curriculum", "hgd_scale_4", "hidden_consistent_flow"]
