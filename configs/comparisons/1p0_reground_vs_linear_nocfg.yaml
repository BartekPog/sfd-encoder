# 1p0B comparison grid (no CFG).
# Compares:
#   - Baseline pretrained SFD 1p0B @ 4M steps (no hidden tokens, no FT)
#   - Baseline finetuned   SFD 1p0B @ 40K steps (no hidden tokens, FT)
#   - Our hidden-token model @ 40K steps, linear schedule + sphere clamp
#   - Our hidden-token model @ 40K steps, reground t_fix=0.9 + sphere clamp
#   - Our hidden-token model @ 40K steps, reground t_fix=0.8 + sphere clamp
#
# Usage:
#   bash run_compare_samples.sh configs/comparisons/1p0_reground_vs_linear_nocfg.yaml

num_samples: 10
num_steps: 100
seed: 0
comparison_name: 1p0_reground_vs_linear_nocfg
output_dir: outputs/comparisons

experiments:
  - label: "Baseline (no FT) @ 4M"
    config: configs/sfd/hidden_1p0_h200_from_ft/finetune_no_hidden.yaml
    ckpt_path: outputs/train/sfd_1p0/checkpoints/4000000.pt

  - label: "Baseline FT @ 40K"
    config: configs/sfd/hidden_1p0_h200_from_ft/finetune_no_hidden.yaml
    ckpt_step: 40000

  - label: "Ours @ 40K — Linear"
    config: configs/sfd/hidden_1p0_h200_from_ft/v4_mse0001_noisy_enc_nocurr_shift1_repg_1p5.yaml
    ckpt_step: 40000
    extra_args: "--hidden_schedule linear --hidden_sphere_clamp"

  - label: "Ours @ 40K — Reground t=0.9"
    config: configs/sfd/hidden_1p0_h200_from_ft/v4_mse0001_noisy_enc_nocurr_shift1_repg_1p5.yaml
    ckpt_step: 40000
    extra_args: "--encode_reground_t_fix 0.9 --hidden_sphere_clamp --reground_fixed_enc_noise"

  - label: "Ours @ 40K — Reground t=0.8"
    config: configs/sfd/hidden_1p0_h200_from_ft/v4_mse0001_noisy_enc_nocurr_shift1_repg_1p5.yaml
    ckpt_step: 40000
    extra_args: "--encode_reground_t_fix 0.8 --hidden_sphere_clamp --reground_fixed_enc_noise"
